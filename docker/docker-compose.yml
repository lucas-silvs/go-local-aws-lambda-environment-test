services:
  localstack:
    image: localstack/localstack:3
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=us-east-1
    volumes:
      - ./init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15

  mock-api:
    build:
      context: ./mock-api
    container_name: mock-api
    ports:
      - "8000:8000"

  lambda:
    build:
      context: ..
      dockerfile: docker/Dockerfile.lambda
    container_name: lambda
    ports:
      - "9000:8080"
    environment:
      - USER_API_URL=http://mock-api:8000/user/create

  sqs-poller:
    build:
      context: ./poller
    container_name: sqs-poller
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SQS_ENDPOINT=http://localstack:4566
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/lambda-queue
      - LAMBDA_ENDPOINT=http://lambda:8080/2015-03-31/functions/function/invocations
    restart: on-failure
